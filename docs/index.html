<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple — Music Therapy System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d1a;
      --surface: rgba(255,255,255,0.05);
      --surface2: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.1);
      --text: #eeeef5;
      --muted: rgba(238,238,245,0.45);
      --accent: #9b8cff;
      --accent2: #ff8cc8;
      --green: #4ade80;
      --thumb: #ff6b6b;
      --index: #ff9f43;
      --middle: #ffd93d;
      --ring: #6bcb77;
      --pinky: #9b8cff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 10%, rgba(155,140,255,0.18) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 15%, rgba(255,140,200,0.14) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 60%, rgba(107,203,119,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(255,159,67,0.10) 0%, transparent 40%),
        linear-gradient(160deg, #0d0d1a 0%, #131326 50%, #0f0f1e 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Animated floating orb */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155,140,255,0.07) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-60px, 80px) scale(1.15); }
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 3.5rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .header p {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Warning */
    .warning {
      background: rgba(250,200,50,0.08);
      border: 1px solid rgba(250,200,50,0.3);
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 28px;
      text-align: center;
      font-size: 0.8rem;
      color: #ffd700;
    }

    .warning a { color: #ffd700; }
    .hidden { display: none !important; }

    /* Control bar */
    .control-bar {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 10px 22px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface2);
    }

    .btn:hover:not(:disabled) {
      border-color: rgba(255,255,255,0.2);
      background: #222230;
    }

    .btn:disabled { opacity: 0.35; cursor: default; }

    .btn-connect { 
      border-color: rgba(155,140,255,0.6); 
      color: #fff;
      background: linear-gradient(135deg, rgba(155,140,255,0.4), rgba(155,140,255,0.2));
      box-shadow: 0 0 20px rgba(155,140,255,0.25);
    }
    .btn-connect:hover:not(:disabled) { 
      background: linear-gradient(135deg, rgba(155,140,255,0.6), rgba(155,140,255,0.3));
      box-shadow: 0 0 30px rgba(155,140,255,0.4);
    }
    .btn-disconnect { 
      border-color: rgba(255,107,107,0.6); 
      color: #fff;
      background: linear-gradient(135deg, rgba(255,107,107,0.4), rgba(255,107,107,0.2));
      box-shadow: 0 0 20px rgba(255,107,107,0.25);
    }
    .btn-disconnect:hover:not(:disabled) { 
      background: linear-gradient(135deg, rgba(255,107,107,0.6), rgba(255,107,107,0.3));
      box-shadow: 0 0 30px rgba(255,107,107,0.4);
    }
    .btn-calibrate { 
      border-color: rgba(255,140,200,0.6); 
      color: #fff;
      background: linear-gradient(135deg, rgba(255,140,200,0.4), rgba(255,140,200,0.2));
      box-shadow: 0 0 20px rgba(255,140,200,0.25);
    }
    .btn-calibrate:hover:not(:disabled) { 
      background: linear-gradient(135deg, rgba(255,140,200,0.6), rgba(255,140,200,0.3));
      box-shadow: 0 0 30px rgba(255,140,200,0.4);
    }
    .btn-calibrated { 
      border-color: rgba(74,222,128,0.6); 
      color: #fff;
      background: linear-gradient(135deg, rgba(74,222,128,0.4), rgba(74,222,128,0.2));
      box-shadow: 0 0 20px rgba(74,222,128,0.25);
    }
    .btn-recalibrate { 
      border-color: rgba(255,217,61,0.6); 
      color: #fff;
      background: linear-gradient(135deg, rgba(255,217,61,0.4), rgba(255,217,61,0.2));
      box-shadow: 0 0 20px rgba(255,217,61,0.2);
    }
    .btn-recalibrate:hover:not(:disabled) { 
      background: linear-gradient(135deg, rgba(255,217,61,0.5), rgba(255,217,61,0.3));
      box-shadow: 0 0 30px rgba(255,217,61,0.35);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      border: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      padding: 9px;
      border-radius: 7px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .tab.active {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* Preset strip */
    .preset-strip {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 9px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .preset-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

    .preset-btn.active {
      background: rgba(124,109,250,0.15);
      border-color: rgba(124,109,250,0.5);
      color: var(--accent);
    }

    /* Panel */
    .panel {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* Hand visualization */
    .hand-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 10px;
      padding: 20px 0 10px;
    }

    .finger-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .finger {
      border-radius: 16px 16px 8px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: all 0.08s ease;
      position: relative;
      overflow: hidden;
    }

    .finger::after {
      content: '';
      position: absolute;
      inset: 0;
      background: inherit;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.08s;
    }

    .finger.active {
      transform: scaleY(0.95) translateY(2px);
    }

    .finger.clickable { cursor: pointer; }
    .finger.clickable:hover { border-color: rgba(255,255,255,0.2); }

    .finger-note {
      font-size: 0.62rem;
      font-weight: 500;
      text-align: center;
      padding: 4px 2px 6px;
      letter-spacing: 0.03em;
    }

    .finger-label {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-line {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 16px;
      min-height: 1.2em;
      transition: all 0.2s;
    }

    /* Mapping grid */
    .mapping-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .mapping-cell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
      transition: all 0.15s;
    }

    .mapping-cell.clickable { cursor: pointer; }
    .mapping-cell.clickable:hover { background: #222230; border-color: rgba(255,255,255,0.15); }

    .mapping-cell .note { font-size: 0.9rem; font-weight: 500; margin-bottom: 3px; }
    .mapping-cell .fname { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* Settings */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) { .settings-grid { grid-template-columns: 1fr; } }

    .setting-group label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .instrument-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .inst-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 8px 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .inst-btn.active {
      border-color: rgba(249,115,22,0.5);
      color: #f97316;
      background: rgba(249,115,22,0.08);
    }

    .inst-btn:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,0.15); }

    /* Tutorial */
    .tutorial-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .tutorial-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tutorial-card:hover { border-color: rgba(255,255,255,0.15); background: #222230; }
    .tutorial-card.active-tut { border-color: rgba(124,109,250,0.5); background: rgba(124,109,250,0.08); }

    .tut-name { font-size: 0.8rem; margin-bottom: 4px; }
    .tut-meta { font-size: 0.62rem; color: var(--muted); }

    .difficulty-beginner { color: var(--green); }
    .difficulty-easy { color: #60a5fa; }
    .difficulty-medium { color: #f97316; }
    .difficulty-hard { color: #ef4444; }

    /* Tutorial active view */
    .tutorial-active {
      text-align: center;
    }

    .tut-progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      margin: 16px 0;
      overflow: hidden;
    }

    .tut-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .tut-next-label {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .tut-next-finger {
      font-family: 'DM Serif Display', serif;
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .tut-sequence {
      display: flex;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .seq-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      transition: all 0.15s;
    }

    .seq-dot.done { background: var(--green); border-color: var(--green); }
    .seq-dot.current { background: var(--accent); border-color: var(--accent); transform: scale(1.4); }

    .tut-complete {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem;
      color: var(--green);
      margin-bottom: 10px;
    }

    /* Recording */
    .rec-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .rec-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72rem;
      color: #ef4444;
    }

    .rec-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .recording-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .recording-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .rec-info { font-size: 0.75rem; }
    .rec-dur { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

    .btn-sm {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .btn-sm:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .btn-sm.play { border-color: rgba(74,222,128,0.3); color: var(--green); }
    .btn-sm.stop { border-color: rgba(239,68,68,0.3); color: #ef4444; }
    .btn-sm.danger { border-color: rgba(239,68,68,0.2); color: rgba(239,68,68,0.6); }
    .btn-sm.danger:hover { color: #ef4444; border-color: rgba(239,68,68,0.4); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      max-width: 520px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      margin-bottom: 20px;
    }

    .modal-section-title {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 16px 0 8px;
    }

    .chord-category {
      margin-bottom: 12px;
    }

    .chord-grid-modal {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chord-btn-modal {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 7px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .chord-btn-modal:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .chord-btn-modal.selected {
      border-color: rgba(74,222,128,0.5);
      color: var(--green);
      background: rgba(74,222,128,0.08);
    }

    .drum-btn-modal {
      border-color: rgba(249,115,22,0.3);
      color: #f97316;
    }

    .drum-btn-modal.selected {
      background: rgba(249,115,22,0.12);
      border-color: rgba(249,115,22,0.6);
    }

    .modal-footer {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }

    .modal-footer button {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
    }

    .modal-footer button:hover { color: var(--text); }

    /* Ripple animation on finger press */
    @keyframes rippleOut {
      0% { box-shadow: 0 0 0 0 rgba(var(--rc), 0.4); }
      100% { box-shadow: 0 0 0 18px rgba(var(--rc), 0); }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Ripple</h1>
    <p>Music Therapy System</p>
  </div>

  <div id="browser-warning" class="warning hidden">
    ⚠️ Web Serial API not supported. Please use <a href="https://www.google.com/chrome/" target="_blank">Chrome</a> or Edge.
  </div>

  <!-- Controls -->
  <div class="control-bar">
    <button id="connect-btn" class="btn btn-connect">Connect</button>
    <button id="calibrate-btn" class="btn btn-calibrate" disabled>Calibrate</button>
    <button id="recalibrate-btn" class="btn btn-recalibrate hidden">Re-calibrate</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="play">Play</button>
    <button class="tab" data-tab="tutorial">Tutorial</button>
    <button class="tab" data-tab="record">Record</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <!-- PLAY TAB -->
  <div id="tab-play">
    <!-- Presets -->
    <div class="preset-strip" id="preset-strip"></div>

    <!-- Quick record bar -->
    <div style="display:flex;justify-content:center;margin-bottom:20px;gap:10px;align-items:center;">
      <button class="btn-sm play" id="play-rec-start-btn">⏺ Start Recording</button>
      <button class="btn-sm stop hidden" id="play-rec-stop-btn">⏹ Stop Recording</button>
      <span class="rec-indicator hidden" id="play-rec-indicator"><span class="rec-dot"></span> Recording</span>
    </div>

    <!-- Hand -->
    <div class="panel">
      <div class="panel-title">Hand Visualization</div>
      <div class="hand-wrap" id="hand-wrap"></div>
      <div class="status-line" id="status-line">Connect exoskeleton to start</div>
    </div>

    <!-- Mapping -->
    <div class="panel">
      <div class="panel-title">Current Mapping</div>
      <div class="mapping-grid" id="mapping-grid"></div>
    </div>
  </div>

  <!-- TUTORIAL TAB -->
  <div id="tab-tutorial" class="hidden">
    <div class="panel" id="tut-browser">
      <div class="panel-title">Choose a Song</div>
      <div class="tutorial-list" id="tutorial-list"></div>
    </div>

    <div class="panel hidden" id="tut-active-panel">
      <div class="tutorial-active" id="tut-active-content"></div>
      <div style="display:flex; gap:8px; margin-top:16px;">
        <button class="btn-sm" id="tut-reset-btn">↺ Restart</button>
        <button class="btn-sm danger" id="tut-exit-btn">Exit Tutorial</button>
      </div>
    </div>
  </div>

  <!-- RECORD TAB -->
  <div id="tab-record" class="hidden">
    <div class="panel">
      <div class="panel-title">Recording</div>
      <div class="rec-controls">
        <button class="btn-sm play" id="rec-start-btn">⏺ Start Recording</button>
        <button class="btn-sm stop hidden" id="rec-stop-btn">⏹ Stop</button>
        <span class="rec-indicator hidden" id="rec-indicator"><span class="rec-dot"></span> Recording</span>
      </div>
      <div class="recording-list" id="recording-list"></div>
    </div>
  </div>

  <!-- SETTINGS TAB -->
  <div id="tab-settings" class="hidden">
    <div class="panel">
      <div class="panel-title">Configuration</div>
      <div class="settings-grid">
        <div class="setting-group">
          <label>Sensitivity ON threshold: <span id="thresh-on-val">25</span>%</label>
          <input type="range" id="thresh-on" min="5" max="60" value="25">
        </div>
        <div class="setting-group">
          <label>Release threshold: <span id="thresh-off-val">8</span>%</label>
          <input type="range" id="thresh-off" min="2" max="40" value="8">
        </div>
        <div class="setting-group">
          <label>Smoothing (filter frames): <span id="filter-val">5</span></label>
          <input type="range" id="filter-size" min="1" max="15" value="5">
        </div>
        <div class="setting-group">
          <label>Volume: <span id="volume-val">30</span>%</label>

// ═══════════════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════════════
const AudioEngine = (() => {
  const SR = 44100;
  let ctx = null;
  let masterGain = null;
  let activeNodes = {}; // finger -> {osc nodes or buffer source}
  let drumBuffers = {};
  let volume = 0.3;
  let instrument = 'pad';

  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SR });
    masterGain = ctx.createGain();
    masterGain.gain.value = volume;
    masterGain.connect(ctx.destination);
    buildDrums();
  }

  function resume() { ctx && ctx.state === 'suspended' && ctx.resume(); }

  // ── Drum synthesis (ported from server.py) ──
  function buildDrums() {
    const drums = {
      kick(sr) {
        const dur = 0.4, n = Math.floor(sr*dur);
        const buf = ctx.createBuffer(1, n, sr);
        const d = buf.getChannelData(0);
        for (let i=0;i<n;i++) {
          const t=i/sr;
          const freq = 55*Math.exp(-2*t);
          d[i] = Math.sin(2*Math.PI*freq*t)*Math.exp(-3*t)
               + 0.6*Math.sin(2*Math.PI*35*t)*Math.exp(-4*t)
               + 0.2*(Math.random()*2-1)*Math.exp(-80*t);
        }
        normalize(d, 0.75); return buf;
      },
      snare(sr) {
        const dur=0.3, n=Math.floor(sr*dur);
        const buf=ctx.createBuffer(1,n,sr); const d=buf.getChannelData(0);
        for(let i=0;i<n;i++){const t=i/sr;
          d[i]=0.4*Math.sin(2*Math.PI*180*t)*Math.exp(-25*t)
              +0.6*(Math.random()*2-1)*Math.exp(-18*t);}
        normalize(d,0.75); return buf;
      },
      hihat(sr) {
        const dur=0.12, n=Math.floor(sr*dur);
        const buf=ctx.createBuffer(1,n,sr); const d=buf.getChannelData(0);
        for(let i=0;i<n;i++){const t=i/sr; d[i]=(Math.random()*2-1)*Math.exp(-35*t);}
        normalize(d,0.6); return buf;
      },
      tom(sr) {
        const dur=0.4, n=Math.floor(sr*dur);
        const buf=ctx.createBuffer(1,n,sr); const d=buf.getChannelData(0);
        for(let i=0;i<n;i++){const t=i/sr;
          const freq=90*Math.exp(-4*t);
          d[i]=Math.sin(2*Math.PI*freq*t)*Math.exp(-8*t);}
        normalize(d,0.75); return buf;
      },
      clap(sr) {
        const dur=0.3, n=Math.floor(sr*dur);
        const buf=ctx.createBuffer(1,n,sr); const d=buf.getChannelData(0);
        for(let k=0;k<5;k++){
          const off=Math.floor((k*0.012+Math.random()*0.005)*sr);
          for(let i=0;i<n-off;i++){
            const t=i/sr;
            d[i+off]+=(Math.random()*2-1)*Math.exp(-60*t)*Math.pow(0.7,k);
          }
        }
        for(let i=0;i<n;i++){const t=i/sr; d[i]*=Math.exp(-12*t);}
        normalize(d,0.75); return buf;
      },
      cymbal(sr) {
        const dur=0.8, n=Math.floor(sr*dur);
        const buf=ctx.createBuffer(1,n,sr); const d=buf.getChannelData(0);
        for(let i=0;i<n;i++){const t=i/sr;
          d[i]=(Math.random()*2-1)*Math.exp(-2.5*t)
              +0.4*(Math.random()*2-1)*Math.exp(-1*t);}
        normalize(d,0.6); return buf;
      },
    };
    for(const [name, fn] of Object.entries(drums)) {
      drumBuffers[name] = fn(ctx.sampleRate);
    }
  }

  function normalize(d, peak) {
    let mx=0; for(let i=0;i<d.length;i++) mx=Math.max(mx,Math.abs(d[i]));
    if(mx>0) for(let i=0;i<d.length;i++) d[i]=d[i]/mx*peak;
  }

  // ── Sustained tones (ported from server.py audio_callback) ──
  function startFinger(finger, freqs, inst) {
    stopFinger(finger);
    if(!freqs||freqs.length===0) return;

    const nodes = [];
    const gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0, ctx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.3/freqs.length, ctx.currentTime+0.005);
    gainNode.connect(masterGain);

    for(const freq of freqs) {
      if(inst==='sine') {
        const o=ctx.createOscillator(); o.type='sine'; o.frequency.value=freq;
        o.connect(gainNode); o.start(); nodes.push(o);
      } else if(inst==='soft') {
        [1,2,3].forEach((h,i)=>{
          const o=ctx.createOscillator(); const g=ctx.createGain();
          o.frequency.value=freq*h; g.gain.value=[0.6,0.3,0.1][i];
          o.connect(g); g.connect(gainNode); o.start(); nodes.push(o);
        });
      } else if(inst==='bell') {
        [1,2].forEach((h,i)=>{
          const o=ctx.createOscillator(); const g=ctx.createGain();
          o.frequency.value=freq*h; g.gain.value=[1,0.5][i];
          o.connect(g); g.connect(gainNode); o.start(); nodes.push(o);
        });
        // bell decays
        gainNode.gain.cancelScheduledValues(ctx.currentTime);
        gainNode.gain.setValueAtTime(0.3/freqs.length, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1.5);
      } else if(inst==='pad') {
        [-0.002,0,0.002].forEach(detune=>{
          const o=ctx.createOscillator(); const g=ctx.createGain();
          o.frequency.value=freq*(1+detune); g.gain.value=0.33;
          o.connect(g); g.connect(gainNode); o.start(); nodes.push(o);
        });
      }
    }

    activeNodes[finger] = { nodes, gainNode };
  }

  function stopFinger(finger) {
    const entry = activeNodes[finger];
    if(!entry) return;
    const { nodes, gainNode } = entry;
    const now = ctx.currentTime;
    gainNode.gain.cancelScheduledValues(now);
    gainNode.gain.setValueAtTime(gainNode.gain.value, now);
    gainNode.gain.linearRampToValueAtTime(0, now+0.02);
    setTimeout(()=>{
      nodes.forEach(n=>{ try{n.stop();}catch(e){} });
      try{gainNode.disconnect();}catch(e){}
    }, 50);
    delete activeNodes[finger];
  }

  function playDrum(name) {
    init(); resume();
    const buf = drumBuffers[name];
    if(!buf) return;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(masterGain);
    src.start();
  }

  function setVolume(v) {
    volume = v;
    if(masterGain) masterGain.gain.value = v;
  }

  function setInstrument(i) { instrument = i; }
  function getInstrument() { return instrument; }

  // Update sustained notes for current active set
  function updateActive(activeSet, preset) {
    init(); resume();
    const inst = preset.instrument;

    // Stop fingers no longer active
    for(const f of Object.keys(activeNodes)) {
      if(!activeSet.has(f)) stopFinger(f);
    }

    if(inst==='drums') return;

    // Start newly active fingers
    for(const f of activeSet) {
      if(!activeNodes[f]) {
        const sound = preset.mapping[f];
        const freqs = CHORDS[sound] || [];
        startFinger(f, freqs, inst);
      }
    }
  }

  function triggerDrums(newlyPressed, preset) {
    init(); resume();
    if(preset.instrument!=='drums') return;
    for(const f of newlyPressed) {
      const sound = preset.mapping[f];
      if(DRUMS.includes(sound)) playDrum(sound);
    }
  }

  function stopAll() {
    for(const f of Object.keys(activeNodes)) stopFinger(f);
  }

  return { init, resume, updateActive, triggerDrums, playDrum, setVolume, setInstrument, getInstrument, stopAll };
})();

//  SERIAL
// ═══════════════════════════════════════════════════════
const Serial = (() => {
  let port=null, reader=null, connected=false;
  let buf = new Uint8Array(0);

  async function connect() {
    try {
      port = await navigator.serial.requestPort();
      await port.open({ baudRate: 921600 });
      connected = true;
      readLoop();
      return true;
    } catch(e) { console.error(e); return false; }
  }

  async function disconnect() {
    connected = false;
    if(reader) { try{await reader.cancel();}catch(e){} reader=null; }
    if(port) { try{await port.close();}catch(e){} port=null; }
    buf = new Uint8Array(0);
  }

  async function readLoop() {
    while(port && port.readable && connected) {
      reader = port.readable.getReader();
      try {
        while(true) {
          const {value, done} = await reader.read();
          if(done) break;
          process(value);
        }
      } catch(e) { if(connected) console.error(e); }
      finally { reader.releaseLock(); }
    }
  }

  function process(data) {
    const combined = new Uint8Array(buf.length + data.length);
    combined.set(buf); combined.set(data, buf.length);
    buf = combined;

    while(buf.length >= 40) {
      let hi = -1;
      for(let i=0;i<buf.length-1;i++) {
        if(buf[i]===0xAA && buf[i+1]===0x55) { hi=i; break; }
      }
      if(hi===-1) { buf=buf.slice(-1); break; }
      if(hi+40>buf.length) { buf=buf.slice(hi); break; }

      const pkt = buf.slice(hi, hi+40);
      const vals = [];
      for(let i=0;i<10;i++) {
        vals.push((pkt[i*4]|(pkt[i*4+1]<<8)|(pkt[i*4+2]<<16)|(pkt[i*4+3]<<24))>>>0);
      }
      App.onPacket(vals);
      buf = buf.slice(hi+40);
    }
    if(buf.length>500) buf=buf.slice(-100);
  }

  return { connect, disconnect, isConnected:()=>connected };
})();

// ═══════════════════════════════════════════════════════
//  APP STATE
// ═══════════════════════════════════════════════════════
const App = (() => {
  let connected=false, calibrated=false;
  let currentPreset='therapy';
  let activeFingers = new Set();
  let baseline={};
  let calibSamples={};

  // Hysteresis thresholds (match server.py defaults)
  let threshOn=0.25, threshOff=0.08;
  let filterSize=5;
  const fingerBuffers={thumb:[],index:[],middle:[],ring:[],pinky:[]};

  // Tutorial state
  let mode='play'; // 'play' | 'tutorial'
  let tutState={current:null, step:0, completed:false};
  let tutReady=new Set(FINGERS);

  // Recording state
  let recording=false, playingBack=false;
  let recEvents=[], recStart=0;
  let savedRecordings=[];
  let pbTimer=null;

  // Custom per-finger type
  let customTypes={thumb:'note',index:'note',middle:'note',ring:'note',pinky:'note'};
  let customInstrument='sine';

  // Current active tab
  let activeTab='play';

  function getPreset() {
    return PRESETS[currentPreset];
  }

  // Moving average filter
  function filterValue(finger, raw) {
    const arr = fingerBuffers[finger];
    arr.push(raw);
    if(arr.length > filterSize) arr.shift();
    return arr.reduce((a,b)=>a+b,0)/arr.length;
  }

  function clearBuffers() {
    FINGERS.forEach(f=>{ fingerBuffers[f]=[]; });
  }

  // Called by Serial on each 10-value packet
  function onPacket(vals) {
    if(!connected) return;

    // Collect calibration samples
    if(!calibrated && calibSamples && Object.keys(calibSamples).length>0) {
      FINGERS.forEach(f=>{ calibSamples[f].push(vals[FINGER_CFG[f].idx]); });
    }

    if(!calibrated) return;

    const newActive = new Set();

    for(const f of FINGERS) {
      const cfg = FINGER_CFG[f];
      const raw = vals[cfg.idx];
      const filtered = filterValue(f, raw);
      const drop = (baseline[f]-filtered)/cfg.range;

      // Hysteresis
      if(activeFingers.has(f)) {
        if(drop > threshOff) newActive.add(f);
      } else {
        if(drop > threshOn) newActive.add(f);
      }

      // Tutorial release tracking
      if(mode==='tutorial' && drop < 0.05) tutReady.add(f);
    }

    const changed = newActive.size!==activeFingers.size || [...newActive].some(f=>!activeFingers.has(f));

    if(changed) {
      const newlyPressed = [...newActive].filter(f=>!activeFingers.has(f));

      // Record
      if(recording && newlyPressed.length>0) {
        const ts = (Date.now()-recStart)/1000;
        recEvents.push({ time:ts, fingers:[...newlyPressed] });
      }

      // Tutorial progress
      if(mode==='tutorial' && newlyPressed.length>0) {
        for(const f of newlyPressed) checkTutorialProgress(f);
      }

      // Audio
      AudioEngine.triggerDrums(new Set(newlyPressed), getPreset());
      AudioEngine.updateActive(newActive, getPreset());

      activeFingers = newActive;
      UI.updateFingers(activeFingers, currentPreset);
      UI.updateStatus(activeFingers, currentPreset);
    }
  }

  function checkTutorialProgress(finger) {
    if(!tutState.current || tutState.completed) return;
    const tut = TUTORIALS[tutState.current];
    const expected = tut.sequence[tutState.step];
    if(finger===expected && tutReady.has(finger)) {
      tutReady.delete(finger);
      tutState.step++;
      if(tutState.step>=tut.sequence.length) {
        tutState.completed=true;
        UI.renderTutorialActive();
      } else {
        UI.renderTutorialActive();
      }
    }
  }

  async function doConnect() {
    const ok = await Serial.connect();
    if(ok) {
      connected=true;
      AudioEngine.init();
      UI.syncAll();
    } else {
      UI.syncAll();
    }
  }

  async function doDisconnect() {
    AudioEngine.stopAll();
    await Serial.disconnect();
    connected=false; calibrated=false;
    baseline={}; calibSamples={};
    activeFingers=new Set();
    clearBuffers();
    UI.syncAll();
  }

  async function doCalibrate() {
    if(!connected) return;
    calibrated=false;
    calibSamples={};
    FINGERS.forEach(f=>{ calibSamples[f]=[]; });
    clearBuffers();
    UI.setStatus('Keep hand still…');
    await new Promise(r=>setTimeout(r,1200));
    for(const f of FINGERS) {
      const s=calibSamples[f];
      if(s.length>0) baseline[f]=s.reduce((a,b)=>a+b,0)/s.length;
    }
    calibrated=true;
    calibSamples={};
    UI.syncAll();
  }

  function setPreset(p) {
    currentPreset=p;
    AudioEngine.stopAll();
    activeFingers=new Set();
    UI.syncAll();
  }

  function setMapping(finger, sound, type='note') {
    PRESETS.custom.mapping[finger]=sound;
    customTypes[finger]=type;
    currentPreset='custom';
    UI.syncAll();
  }

  function startTutorial(id) {
    if(!connected||!calibrated) { alert('Please connect and calibrate first.'); return; }
    tutState={current:id, step:0, completed:false};
    tutReady=new Set(FINGERS);
    mode='tutorial';
    // Apply this song's specific note mapping to the piano preset
    const tut = TUTORIALS[id];
    if(tut.mapping) {
      PRESETS.piano.mapping = {...tut.mapping};
    }
    currentPreset='piano';
    AudioEngine.stopAll();
    activeFingers=new Set();
    UI.renderTutorialActive();
    document.getElementById('tut-browser').classList.add('hidden');
    document.getElementById('tut-active-panel').classList.remove('hidden');
  }

  function resetTutorial() {
    if(!tutState.current) return;
    tutState.step=0; tutState.completed=false;
    tutReady=new Set(FINGERS);
    AudioEngine.stopAll();
    activeFingers=new Set();
    UI.renderTutorialActive();
  }

  function exitTutorial() {
    mode='play'; tutState={current:null,step:0,completed:false};
    // Restore piano preset to default
    PRESETS.piano.mapping={thumb:'C',index:'D',middle:'E',ring:'F',pinky:'G'};
    AudioEngine.stopAll(); activeFingers=new Set();
    document.getElementById('tut-browser').classList.remove('hidden');
    document.getElementById('tut-active-panel').classList.add('hidden');
    UI.renderTutorialList();
  }

  function startRecording() {
    recording=true; recEvents=[]; recStart=Date.now();
    // Record tab buttons
    document.getElementById('rec-start-btn').classList.add('hidden');
    document.getElementById('rec-stop-btn').classList.remove('hidden');
    document.getElementById('rec-indicator').classList.remove('hidden');
    // Play tab buttons
    document.getElementById('play-rec-start-btn').classList.add('hidden');
    document.getElementById('play-rec-stop-btn').classList.remove('hidden');
    document.getElementById('play-rec-indicator').classList.remove('hidden');
  }

  function stopRecording() {
    recording=false;
    const dur = (Date.now()-recStart)/1000;
    savedRecordings.push({ events:[...recEvents], duration:dur, preset:currentPreset, id:Date.now() });
    // Record tab buttons
    document.getElementById('rec-start-btn').classList.remove('hidden');
    document.getElementById('rec-stop-btn').classList.add('hidden');
    document.getElementById('rec-indicator').classList.add('hidden');
    // Play tab buttons
    document.getElementById('play-rec-start-btn').classList.remove('hidden');
    document.getElementById('play-rec-stop-btn').classList.add('hidden');
    document.getElementById('play-rec-indicator').classList.add('hidden');
    UI.renderRecordingList();
  }

  function playbackRecording(rec) {
    if(playingBack) return;
    playingBack=true;
    const events=[...rec.events];
    const savedPreset=currentPreset;
    currentPreset=rec.preset||currentPreset;
    let ei=0;
    const start=Date.now();

    function tick() {
      if(!playingBack||ei>=events.length) {
        playingBack=false;
        AudioEngine.stopAll();
        activeFingers=new Set();
        currentPreset=savedPreset;
        UI.renderRecordingList();
        return;
      }
      const elapsed=(Date.now()-start)/1000;
      while(ei<events.length && events[ei].time<=elapsed) {
        const ev=events[ei];
        const newSet=new Set(ev.fingers);
        AudioEngine.triggerDrums(newSet, getPreset());
        AudioEngine.updateActive(newSet, getPreset());
        activeFingers=newSet;
        UI.updateFingers(activeFingers, currentPreset);
        ei++;
      }
      pbTimer=setTimeout(tick, 16);
    }
    tick();
    UI.renderRecordingList();
  }

  function stopPlayback() {
    playingBack=false;
    clearTimeout(pbTimer);
    AudioEngine.stopAll();
    activeFingers=new Set();
    UI.updateFingers(activeFingers, currentPreset);
    UI.renderRecordingList();
  }

  function deleteRecording(id) {
    savedRecordings=savedRecordings.filter(r=>r.id!==id);
    UI.renderRecordingList();
  }

  return {
    onPacket,
    doConnect, doDisconnect, doCalibrate,
    setPreset, setMapping,
    startTutorial, resetTutorial, exitTutorial,
    startRecording, stopRecording,
    playbackRecording, stopPlayback, deleteRecording,
    get connected(){return connected},
    get calibrated(){return calibrated},
    get currentPreset(){return currentPreset},
    get activeFingers(){return activeFingers},
    get mode(){return mode},
    get tutState(){return tutState},
    get savedRecordings(){return savedRecordings},
    get isPlayingBack(){return playingBack},
    get customTypes(){return customTypes},
    get customInstrument(){return customInstrument},
    set customInstrument(v){ customInstrument=v; AudioEngine.setInstrument(v); },
    setThreshOn(v){threshOn=v},
    setThreshOff(v){threshOff=v},
    setFilterSize(v){filterSize=v},
  };
})();

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
const UI = (() => {

  function syncAll() {
    renderConnectBtn();
    renderPresets();
    renderHand();
    renderMapping();
    renderRecordingList();
  }

  function renderConnectBtn() {
    const cb = document.getElementById('connect-btn');
    const cal = document.getElementById('calibrate-btn');
    const recal = document.getElementById('recalibrate-btn');

    if(App.connected) {
      cb.textContent='Disconnect'; cb.className='btn btn-disconnect';
      if(App.calibrated) {
        cal.classList.add('hidden');
        recal.classList.remove('hidden');
        recal.textContent='Re-calibrate'; recal.className='btn btn-recalibrate';
      } else {
        cal.disabled=false; cal.textContent='Calibrate'; cal.className='btn btn-calibrate';
        cal.classList.remove('hidden'); recal.classList.add('hidden');
      }
    } else {
      cb.textContent='Connect'; cb.className='btn btn-connect';
      cal.disabled=true; cal.textContent='Calibrate'; cal.className='btn btn-calibrate';
      cal.classList.remove('hidden'); recal.classList.add('hidden');
    }
  }

  function renderPresets() {
    const strip = document.getElementById('preset-strip');
    strip.innerHTML = Object.entries(PRESETS).map(([k,v])=>`
      <button class="preset-btn ${App.currentPreset===k?'active':''}" data-p="${k}">${v.name}</button>
    `).join('');
    strip.querySelectorAll('.preset-btn').forEach(b=>{
      b.addEventListener('click',()=>App.setPreset(b.dataset.p));
    });
  }

  function renderHand() {
    const wrap = document.getElementById('hand-wrap');
    const preset = PRESETS[App.currentPreset];
    const isCustom = App.currentPreset==='custom';
    wrap.innerHTML = FINGERS.map(f=>{
      const cfg=FINGER_CFG[f];
      const active=App.activeFingers.has(f);
      const sound=preset.mapping[f];
      return `
        <div class="finger-col">
          <div class="finger ${active?'active':''} ${isCustom?'clickable':''}"
               data-f="${f}"
               style="
                 width:${cfg.w}px;height:${cfg.h}px;
                 background:${active?`linear-gradient(180deg,${cfg.color},${cfg.color}88)`:'var(--surface2)'};
                 border-color:${active?cfg.color+'66':'var(--border)'};
                 box-shadow:${active?`0 0 20px ${cfg.color}44`:'none'};
               ">
            <span class="finger-note" style="color:${active?'#fff':cfg.color}">${sound}</span>
          </div>
          <span class="finger-label">${f}</span>
        </div>
      `;
    }).join('');
    if(isCustom) {
      wrap.querySelectorAll('.finger').forEach(el=>{
        el.addEventListener('click',()=>openChordModal(el.dataset.f));
      });
    }
  }

  function updateFingers(activeSet, preset) {
    const p = PRESETS[preset];
    document.querySelectorAll('.finger[data-f]').forEach(el=>{
      const f=el.dataset.f; const cfg=FINGER_CFG[f]; const active=activeSet.has(f);
      el.classList.toggle('active', active);
      el.style.background=active?`linear-gradient(180deg,${cfg.color},${cfg.color}88)`:'var(--surface2)';
      el.style.borderColor=active?cfg.color+'66':'var(--border)';
      el.style.boxShadow=active?`0 0 20px ${cfg.color}44`:'none';
    });
    updateStatus(activeSet, preset);
    if(App.mode==='tutorial') renderTutorialActive();
  }

  function updateStatus(activeSet, preset) {
    const line = document.getElementById('status-line');
    if(!App.connected) { line.textContent='Connect exoskeleton to start'; return; }
    if(!App.calibrated) { line.textContent='Click Calibrate and keep hand still'; return; }
    if(activeSet.size>0) {
      const p=PRESETS[preset];
      line.textContent='Playing: '+[...activeSet].map(f=>p.mapping[f]).join(' + ');
    } else {
      line.textContent='Bend fingers to play';
    }
  }

  function setStatus(msg) {
    const line = document.getElementById('status-line');
    if(line) line.textContent=msg;
  }

  function renderMapping() {
    const grid = document.getElementById('mapping-grid');
    const preset = PRESETS[App.currentPreset];
    const isCustom = App.currentPreset==='custom';
    grid.innerHTML = FINGERS.map(f=>`
      <div class="mapping-cell ${isCustom?'clickable':''}" data-f="${f}">
        <div class="note" style="color:${FINGER_CFG[f].color}">${preset.mapping[f]}</div>
        <div class="fname">${f}</div>
      </div>
    `).join('');
    if(isCustom) {
      grid.querySelectorAll('.mapping-cell').forEach(el=>{
        el.addEventListener('click',()=>openChordModal(el.dataset.f));
      });
    }
  }

  function openChordModal(finger) {
    document.getElementById('modal-finger-label').textContent=finger;
    const current=PRESETS.custom.mapping[finger];
    const body=document.getElementById('chord-modal-body');

    const groups=[
      {label:'Single Notes', keys:['C','D','E','F','G','A','B','C#','D#','F#','G#','A#','C5','D5','E5','F5','G5'], cls:''},
      {label:'Major Chords', keys:Object.keys(CHORDS).filter(k=>k.includes('_maj')), cls:''},
      {label:'Minor Chords', keys:Object.keys(CHORDS).filter(k=>k.endsWith('m')&&!k.includes('_')), cls:''},
      {label:'7th Chords',   keys:Object.keys(CHORDS).filter(k=>k.endsWith('7')), cls:''},
      {label:'Drums',        keys:DRUMS, cls:'drum-btn-modal'},
      {label:'None',         keys:['none'], cls:''},
    ];

    body.innerHTML=groups.map(g=>`
      <div class="modal-section-title">${g.label}</div>
      <div class="chord-grid-modal">
        ${g.keys.map(k=>`
          <button class="chord-btn-modal ${g.cls} ${k===current?'selected':''}" data-k="${k}" data-drum="${g.cls?'1':'0'}">${k}</button>
        `).join('')}
      </div>
    `).join('');

    body.querySelectorAll('.chord-btn-modal').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const isDrum=btn.dataset.drum==='1';
        App.setMapping(finger, btn.dataset.k, isDrum?'drum':'note');
        closeModal();
      });
    });

    document.getElementById('chord-modal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('chord-modal').classList.add('hidden');
  }

  function renderTutorialList() {
    const list=document.getElementById('tutorial-list');
    list.innerHTML=Object.entries(TUTORIALS).map(([id,t])=>`
      <div class="tutorial-card" data-id="${id}">
        <div class="tut-name">${t.name}</div>
        <div class="tut-meta difficulty-${t.difficulty.toLowerCase()}">${t.difficulty} · ${t.sequence.length} notes</div>
      </div>
    `).join('');
    list.querySelectorAll('.tutorial-card').forEach(c=>{
      c.addEventListener('click',()=>App.startTutorial(c.dataset.id));
    });
  }

  function renderTutorialActive() {
    const ts=App.tutState;
    if(!ts.current) return;
    const tut=TUTORIALS[ts.current];
    const content=document.getElementById('tut-active-content');

    if(ts.completed) {
      content.innerHTML=`
        <div class="tut-complete">🎉 Complete!</div>
        <div style="color:var(--muted);font-size:0.8rem;margin-bottom:16px;">You played <em>${tut.name}</em></div>
      `;
      return;
    }

    const nextF=tut.sequence[ts.step];
    const cfg=FINGER_CFG[nextF];
    const pct=Math.round(ts.step/tut.sequence.length*100);

    const dots=tut.sequence.map((f,i)=>{
      let cls='seq-dot';
      if(i<ts.step) cls+=' done';
      else if(i===ts.step) cls+=' current';
      return `<div class="${cls}" style="${i===ts.step?`background:${cfg.color};border-color:${cfg.color}`:''}"></div>`;
    }).join('');

    content.innerHTML=`
      <div class="tut-next-label">${tut.name} · Step ${ts.step+1} / ${tut.sequence.length}</div>
      <div class="tut-progress-bar"><div class="tut-progress-fill" style="width:${pct}%"></div></div>
      <div style="color:var(--muted);font-size:0.75rem;margin-bottom:8px;">Press this finger:</div>
      <div class="tut-next-finger" style="color:${cfg.color}">${nextF}</div>
      <div style="font-size:0.7rem;color:${cfg.color};opacity:0.8;margin-bottom:12px;">${tut.mapping[nextF]}</div>
      <div class="tut-sequence">${dots}</div>
      <div style="display:flex;justify-content:center;gap:10px;margin-top:14px;flex-wrap:wrap;">
        ${FINGERS.map(f=>`
          <div style="text-align:center;font-size:0.65rem;">
            <div style="color:${FINGER_CFG[f].color};font-weight:500;">${tut.mapping[f]}</div>
            <div style="color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;">${f}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  function renderRecordingList() {
    const list=document.getElementById('recording-list');
    if(App.savedRecordings.length===0) {
      list.innerHTML=`<div style="color:var(--muted);font-size:0.75rem;margin-top:8px;">No recordings yet.</div>`;
      return;
    }
    list.innerHTML=App.savedRecordings.map(r=>`
      <div class="recording-item">
        <div>
          <div class="rec-info">${PRESETS[r.preset]?.name||r.preset} · ${r.events.length} events</div>
          <div class="rec-dur">${r.duration.toFixed(1)}s</div>
        </div>
        <div style="display:flex;gap:6px">
          ${App.isPlayingBack
            ? `<button class="btn-sm stop" data-stop="1">⏹ Stop</button>`
            : `<button class="btn-sm play" data-id="${r.id}">▶ Play</button>`
          }
          <button class="btn-sm danger" data-del="${r.id}">✕</button>
        </div>
      </div>
    `).join('');
    list.querySelectorAll('[data-id]').forEach(b=>{
      b.addEventListener('click',()=>{
        const rec=App.savedRecordings.find(r=>r.id===parseInt(b.dataset.id));
        if(rec) App.playbackRecording(rec);
      });
    });
    list.querySelectorAll('[data-stop]').forEach(b=>{
      b.addEventListener('click',()=>App.stopPlayback());
    });
    list.querySelectorAll('[data-del]').forEach(b=>{
      b.addEventListener('click',()=>App.deleteRecording(parseInt(b.dataset.del)));
    });
  }

  return {
    syncAll, renderConnectBtn, renderPresets, renderHand,
    updateFingers, updateStatus, setStatus,
    renderMapping, openChordModal, closeModal,
    renderTutorialList, renderTutorialActive,
    renderRecordingList,
  };
})();

// ═══════════════════════════════════════════════════════
//  BOOTSTRAP
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // Browser check
  if(!('serial' in navigator)) {
    document.getElementById('browser-warning').classList.remove('hidden');
    document.getElementById('connect-btn').disabled=true;
  }

  // Initial render
  UI.syncAll();
  UI.renderTutorialList();

  // Connect / Disconnect
  document.getElementById('connect-btn').addEventListener('click', async ()=>{
    if(App.connected) { await App.doDisconnect(); }
    else {
      document.getElementById('connect-btn').disabled=true;
      document.getElementById('connect-btn').textContent='Connecting…';
      await App.doConnect();
    }
  });

  // Calibrate
  document.getElementById('calibrate-btn').addEventListener('click', async ()=>{
    document.getElementById('calibrate-btn').disabled=true;
    document.getElementById('calibrate-btn').textContent='Calibrating…';
    UI.setStatus('Keep hand still…');
    await App.doCalibrate();
  });

  // Re-calibrate
  document.getElementById('recalibrate-btn').addEventListener('click', async ()=>{
    document.getElementById('recalibrate-btn').disabled=true;
    document.getElementById('recalibrate-btn').textContent='Calibrating…';
    UI.setStatus('Keep hand still…');
    await App.doCalibrate();
  });

  // Tabs
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ()=>{
      document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      ['play','tutorial','record','settings'].forEach(id=>{
        document.getElementById('tab-'+id).classList.toggle('hidden', id!==t.dataset.tab);
      });
    });
  });

  // Tutorial buttons
  document.getElementById('tut-reset-btn').addEventListener('click', ()=>App.resetTutorial());
  document.getElementById('tut-exit-btn').addEventListener('click', ()=>App.exitTutorial());

  // Recording (record tab)
  document.getElementById('rec-start-btn').addEventListener('click', ()=>App.startRecording());
  document.getElementById('rec-stop-btn').addEventListener('click', ()=>App.stopRecording());

  // Recording (play tab)
  document.getElementById('play-rec-start-btn').addEventListener('click', ()=>App.startRecording());
  document.getElementById('play-rec-stop-btn').addEventListener('click', ()=>App.stopRecording());

  // Modal cancel
  document.getElementById('modal-cancel').addEventListener('click', ()=>UI.closeModal());
  document.getElementById('chord-modal').addEventListener('click', e=>{
    if(e.target.id==='chord-modal') UI.closeModal();
  });

  // Settings sliders
  document.getElementById('thresh-on').addEventListener('input', e=>{
    const v=parseInt(e.target.value)/100;
    App.setThreshOn(v);
    document.getElementById('thresh-on-val').textContent=e.target.value;
  });
  document.getElementById('thresh-off').addEventListener('input', e=>{
    const v=parseInt(e.target.value)/100;
    App.setThreshOff(v);
    document.getElementById('thresh-off-val').textContent=e.target.value;
  });
  document.getElementById('filter-size').addEventListener('input', e=>{
    App.setFilterSize(parseInt(e.target.value));
    document.getElementById('filter-val').textContent=e.target.value;
  });
  document.getElementById('volume-range').addEventListener('input', e=>{
    AudioEngine.setVolume(parseInt(e.target.value)/100);
    document.getElementById('volume-val').textContent=e.target.value;
  });

  // Instrument buttons
  const instGrid=document.getElementById('inst-grid');
  const insts=[['sine','🎵 Sine'],['soft','🎹 Soft'],['bell','🔔 Bell'],['pad','🧘 Pad']];
  instGrid.innerHTML=insts.map(([k,l])=>`
    <button class="inst-btn ${App.customInstrument===k?'active':''}" data-i="${k}">${l}</button>
  `).join('');
  instGrid.querySelectorAll('.inst-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      instGrid.querySelectorAll('.inst-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      App.customInstrument=b.dataset.i;
    });
  });
});
</script>
